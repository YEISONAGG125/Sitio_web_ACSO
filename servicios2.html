<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
   
    <title>LOGIN</title>
    <style>
        body{
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1{
            color: #333;
            font size: 24px;
        }
        form{
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label{
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"],
        input[type="password"]{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button{
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover{
            background-color: #45a049;
        }
    </style>
    <body>
        <h1>LOGIN</h1>
        <form action="servicios2.html" method="post">
            <label for="GMAIL">Ingresar correo :</label>
            <input type="text" id="GMAIL" ><br><br>
            <label for="password">Ingresar contraseña:</label>
            <input type="password" id="password" ><br><br>
           <button >Iniciar sesión</button><br><br>

           <button >volver</button><br><br>
          
           </body>
            
      
      
</html>
